<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>DRAKON Plugin Working Demo</title>
  <script type="module">
    import mermaid from 'https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.esm.min.mjs';
    
    // Правильный формат внешнего плагина для Mermaid 10
    const drakonPlugin = {
      id: 'drakon',
      detector: (text) => /^\s*drakon\b/.test(text),
      loader: () => {
        return {
          parser: {
            parse: (text) => {
              const lines = text.trim().split('\n').filter(l => l.trim() && !l.trim().startsWith('drakon'));
              const nodes = [];
              let lastId = null;
              
              for (let i = 0; i < lines.length; i++) {
                const trimmed = lines[i].trim();
                const y = i * 80;
                const x = 200;
                
                if (trimmed.startsWith('Начало:')) {
                  const id = 'start';
                  const txt = trimmed.split(':')[1]?.trim().replace(/"/g, '') || 'Start';
                  nodes.push({ id, type: 'start', text: txt, x, y, width: 160, height: 60 });
                  lastId = id;
                } else if (trimmed.startsWith('Конец:')) {
                  const id = 'end';
                  const txt = trimmed.split(':')[1]?.trim().replace(/"/g, '') || 'End';
                  nodes.push({ id, type: 'end', text: txt, x, y, width: 160, height: 60 });
                } else if (trimmed.startsWith('Действие:')) {
                  const id = `action_${i}`;
                  const txt = trimmed.split(':')[1]?.trim().replace(/"/g, '') || 'Action';
                  nodes.push({ id, type: 'action', text: txt, x, y, width: 160, height: 60 });
                  if (lastId) {
                    nodes.push({ id: `edge_${i}`, from: lastId, to: id });
                  }
                  lastId = id;
                }
              }
              
              return { type: 'drakon', nodes };
            }
          }
        };
      }
    };
    
    mermaid.registerExternalDiagrams([drakonPlugin]);
    mermaid.initialize({ startOnLoad: true });
  </script>
</head>
<body>
  <h1>DRAKON Demo (Working)</h1>
  
  <h2>Native flowchart</h2>
  <pre class="mermaid">
graph TD
    A[Start] --> B[End]
  </pre>

  <h2>DRAKON Syntax Test</h2>
  <pre class="mermaid">
drakon
  Начало: "Start"
  Действие: "Process"  
  Конец: "End"
  </pre>
</body>
</html>

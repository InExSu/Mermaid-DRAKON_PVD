<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>DRAKON Plugin Debug</title>
  <style>
    body { font-family: sans-serif; padding: 20px; }
    .mermaid { background: #f5f5f5; padding: 10px; border-radius: 5px; margin: 10px 0; }
    svg { border: 1px solid #ccc; margin: 10px 0; background: white; }
  </style>
</head>
<body>
  <h1>DRAKON Plugin Debug</h1>
  
  <h2>Native flowchart (should work)</h2>
  <pre class="mermaid">
flowchart TD
    A[Start] --> B[End]
  </pre>

  <h2>DRAKON test (inline plugin)</h2>
  <pre class="mermaid">
drakon
  Начало: Start
  Конец: End
  </pre>

  <script type="module">
    import mermaid from 'https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.esm.min.mjs';
    
    // Сначала инициализируем, потом регистрируем плагин
    mermaid.registerExternalDiagrams([{
      id: 'drakon',
      detector: (text) => /^\s*drakon\b/.test(text),
      parser: async (text) => {
        console.log('DRAKON parser called with:', text);
        
        const lines = text.trim().split('\n').filter(l => l.trim() && !l.trim().startsWith('drakon'));
        const nodes = [];
        
        for (let i = 0; i < lines.length; i++) {
          const trimmed = lines[i].trim();
          const y = i * 80;
          
          if (trimmed.startsWith('Начало:')) {
            const text = trimmed.split(':')[1]?.trim().replace(/"/g, '') || 'Start';
            nodes.push({ id: 'start', type: 'start', text, x: 200, y, width: 160, height: 60 });
          } else if (trimmed.startsWith('Конец:')) {
            const text = trimmed.split(':')[1]?.trim().replace(/"/g, '') || 'End';
            nodes.push({ id: 'end', type: 'end', text, x: 200, y, width: 160, height: 60 });
          }
        }
        
        console.log('Parsed nodes:', nodes);
        
        return {
          type: 'drakon',
          nodes,
          edges: []
        };
      }
    }]);
    
    mermaid.initialize({ 
      startOnLoad: true,
      theme: 'default'
    });
  </script>
</body>
</html>

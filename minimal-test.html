<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>DRAKON Plugin Minimal Test</title>
  <style>
    body { font-family: sans-serif; padding: 20px; }
    .mermaid { background: #f5f5f5; padding: 10px; border-radius: 5px; }
    svg { border: 1px solid #ccc; margin: 10px 0; }
  </style>
</head>
<body>
  <h1>DRAKON Plugin Minimal Test</h1>
  
  <h2>Simple Test (flowchart)</h2>
  <pre class="mermaid">
flowchart TD
    A[Start] --> B[End]
  </pre>

  <script type="module">
    import mermaid from 'https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.esm.min.mjs';
    
    // Initialize Mermaid with basic config
    mermaid.initialize({ 
      startOnLoad: true,
      theme: 'default',
      securityLevel: 'loose'
    });
    
    // Log to verify loading
    console.log('Mermaid initialized:', mermaid.version);
  </script>
</body>
</html>

<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>DRAKON Plugin Test</title>
</head>
<body>
  <h1>DRAKON Plugin - Direct Test</h1>
  
  <h2>Native Flowchart (works)</h2>
  <pre class="mermaid">
flowchart TD
    A[Start] --> B[Process] --> C[End]
  </pre>

  <h2>DRAKON Test (inline plugin)</h2>
  <pre class="mermaid">
drakon Start --> Process --> End
  </pre>

  <script type="module">
    import mermaid from 'https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.esm.min.mjs';
    
    // Правильный API для Mermaid 10.x - возвращаем AST в формате Mermaid
    mermaid.registerExternalDiagrams([{
      id: 'drakon',
      detector: (text) => /^\s*drakon\b/.test(text),
      loader: () => ({
        parse: (text) => {
          // Минимальный валидный AST для Mermaid
          // Mermaid ожидает: type, id, children или конкретный формат
          const ast = {
            type: 'drakonDiagram',
            id: 'root',
            nodes: [
              { type: 'start', id: 'n1', text: 'Start' },
              { type: 'action', id: 'n2', text: 'Process' },
              { type: 'end', id: 'n3', text: 'End' }
            ]
          };
          return ast;
        }
      })
    }]);
    
    mermaid.initialize({ startOnLoad: true });
  </script>
</body>
</html>
